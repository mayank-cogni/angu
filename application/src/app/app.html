<!-- 
1. What you CANNOT do (Strictly Forbidden)
Angular will throw an error if you try to do these things inside interpolation:

Assignments: You cannot change a variable's value.

❌ {{ name = 'New Name' }}

Increment/Decrement: You cannot use ++ or --.

❌ {{ age++ }}n

The new Keyword: You cannot instantiate objects.

❌ {{ new Date() }}

Bitwise Operators: You cannot use | or & (unless they are Angular Pipes, which use the same symbol but work differently). -->

<!-- 
1. template (Inline HTML)
You use this when your HTML is very short (usually 1–5 lines). You write the HTML directly inside the @Component decorator using backticks (`).

Pros: Everything is in one file; easier to see the logic and view at once for small components.

Cons: Becomes messy and hard to read if the HTML is long; no specialized syntax highlighting in some editors.

TypeScript
@Component({
  selector: 'app-mini-login',
  template: `
    <div>
      <h1>Login here</h1>
      <button>Submit</button>
    </div>
  `
})
export class MiniLogin {}
2. templateUrl (External File)
This is the standard approach for most Angular components. You provide a path to a separate .html file.

Pros: Keeps your code organized (separation of concerns); full IDE support for HTML (autocompletion, formatting); much easier to maintain for complex layouts.

Cons: You have to jump between two files (the .ts and the .html).

TypeScript
@Component({
  selector: 'app-login',
  templateUrl: './login.html' // Points to a separate file in the same folder
})
export class Login {}
